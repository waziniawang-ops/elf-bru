services:
  - type: web
    name: elf-bru-api
    runtime: python
    rootDir: backend
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: elf-bru-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: elf-bru-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-github-username.github.io
      # Set these in the Render dashboard after sign-up:
      # CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET
      # BANK_NAME, BANK_ACCOUNT_NAME, BANK_ACCOUNT_NUMBER, BANK_INSTRUCTIONS

databases:
  - name: elf-bru-db
    databaseName: elf_bru
    plan: free
